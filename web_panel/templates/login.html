<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VPNPro · Iniciar sesión</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root {
      --accent: #0f766e;
      --accent-hover: #115e59;
    }
    body {
      min-height: 100vh;
      background: radial-gradient(1200px 600px at 15% -10%, #123042 0%, #070c12 55%);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .login-card {
      background: #111b27;
      border: 1px solid #2b3a4d;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%; max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,.6);
    }
    .login-logo { font-size: 2.6rem; font-weight: 800; letter-spacing: -1px; }
    .login-logo span { color: var(--accent); }
    .form-control {
      background: #1a2634 !important; border: 1px solid #2b3a4d; color: #e5edf5 !important;
      border-radius: 8px; padding: .7rem 1rem;
    }
    .form-control:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(15,118,110,.25); }
    .form-label { color: #93a4b8; font-size: .875rem; }
    .btn-login {
      background: var(--accent); border: none; width: 100%; padding: .75rem;
      border-radius: 8px; font-weight: 600; font-size: 1rem;
      transition: background .2s;
    }
    .btn-login:hover { background: var(--accent-hover); }
    .alert { border-radius: 8px; font-size: .875rem; }
    .input-group-text {
      background: #1a2634; border: 1px solid #2b3a4d;
      border-right: none; color: #6b7280;
    }
    .form-control { border-left: none; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="text-center mb-4">
      <div class="login-logo">VPN<span>Pro</span></div>
      <p class="text-muted mt-1 mb-0" style="font-size:.85rem">Panel de Revendedores</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }} py-2">
          <i class="fas fa-circle-exclamation me-2"></i>{{ message }}
        </div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="{{ url_for('auth.login') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() if csrf_token is defined }}">

      <div class="mb-3">
        <label class="form-label">Usuario</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fas fa-user fa-sm"></i></span>
          <input type="text" name="username" class="form-control"
                 placeholder="Ingresa tu usuario" autocomplete="username" required autofocus>
        </div>
      </div>

      <div class="mb-4">
        <label class="form-label">Contraseña</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fas fa-lock fa-sm"></i></span>
          <input type="password" name="password" id="pwdField" class="form-control"
                 placeholder="••••••••" autocomplete="current-password" required>
          <button type="button" class="btn btn-outline-secondary border-0"
                  style="background:#1a2634;border:1px solid #2b3a4d!important;border-left:none!important"
                  onclick="togglePwd()">
            <i class="fas fa-eye fa-sm text-secondary" id="pwdIcon"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="btn btn-login text-white">
        <i class="fas fa-right-to-bracket me-2"></i>Entrar
      </button>
    </form>

    <p class="text-center mt-4 mb-0 pt-3 fw-semibold" style="font-size:.94rem; line-height:1.55; color:#f8fafc; text-shadow:0 1px 1px rgba(0,0,0,.45); border-top:1px solid rgba(148,163,184,.35)">
      VPNPro &copy; 2026 · Panel Web<br>
      Diego Pinto<br>
      (Team)<br>
      <a href="https://www.diegopintoteam.com" target="_blank" rel="noopener noreferrer" style="color:#f8fafc; text-decoration:underline;">www.diegopintoteam.com</a>
    </p>
  </div>

  <script>
    function togglePwd() {
      const f = document.getElementById('pwdField');
      const i = document.getElementById('pwdIcon');
      if (f.type === 'password') { f.type = 'text'; i.classList.replace('fa-eye','fa-eye-slash'); }
      else { f.type = 'password'; i.classList.replace('fa-eye-slash','fa-eye'); }
    }
  </script>
</body>
</html>
